<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#000000">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<title>Music Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    overflow:hidden;
    background:#000;
}

/* Background */
.background{
    position:fixed;
    inset:0;
    background:url("cover/cover.jpg") center center/cover no-repeat;
    filter:brightness(.35);
    z-index:-2;
}

.background::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.35);
}

/* Player */
.player{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:400px;
    text-align:center;
}

/* Cover */
.cover{
    width:220px;
    height:220px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid rgba(255,255,255,.15);
    box-shadow:0 0 25px rgba(0,0,0,.5);
    cursor:pointer;
    transition:.3s;
}

.cover:hover{
    transform:scale(1.05);
}

.cover.playing{
    animation:spin 10s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* Song Info */
.song-info{
    margin-top:20px;
    color:#fff;
}

.song-title{
    font-size:32px;
    font-weight:bold;
}

.artist{
    color:#ccc;
    font-size:18px;
    margin-top:8px;
}

/* Progress */
.progress-area{
    margin-top:20px;
}

#progress{
    width:100%;
    cursor:pointer;
}

.time{
    display:flex;
    justify-content:space-between;
    color:#fff;
    margin-top:5px;
}

/* Controls */
.controls{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:25px;
}

.controls button{
    width:65px;
    height:65px;
    border:none;
    border-radius:50%;
    font-size:25px;
    cursor:pointer;
}

.play{
    width:80px !important;
    height:80px !important;
    font-size:35px !important;
}

/* Playlist */
.playlist{
    position:fixed;
    top:0;
    right:-350px;
    width:350px;
    height:100%;
    background:#111;
    color:#fff;
    overflow-y:auto;
    transition:.4s;
    padding:20px;
}

.playlist.active{
    right:0;
}

.playlist h2{
    text-align:center;
    margin-bottom:20px;
}

.song{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

.song:hover{
    background:#222;
}

.song img{
    width:60px;
    height:60px;
    border-radius:8px;
    object-fit:cover;
}

.song-name{
    font-size:16px;
}

/* Mobile */
@media(max-width:768px){

.player{
    width:90%;
}

.cover{
    width:200px;
    height:200px;
}

.song-title{
    font-size:24px;
}

.playlist{
    width:100%;
    right:-100%;
}

}
</style>

</head>
<body>

<div class="background"></div>

<div class="player">

    <!-- Album Cover -->
    <img src="songs/song1/cover.png" id="cover" class="cover">

    <!-- Song Info -->
    <div class="song-info">
        <div class="song-title" id="title">Song 1</div>
        <div class="artist">Music Player</div>
    </div>

    <!-- Progress -->
    <div class="progress-area">
        <input type="range" id="progress" value="0">
        <div class="time">
            <span id="current">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button class="play" onclick="playPause()">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>

</div>

<!-- Playlist -->
<div class="playlist" id="playlist">
    <h2>Playlist</h2>
</div>

<!-- Audio -->
<audio id="audio"></audio>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
    });
}
</script>

</body>
</html>
