<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<title>Music Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    overflow:hidden;
    background:#000;
}

.background{
    position:fixed;
    inset:0;
    background:url("cover/cover.jpg") center center/cover no-repeat;
    filter:brightness(.3);
    z-index:-2;
}

.background::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.35);
}

.player{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:400px;
    text-align:center;
}

.logo{
    width:220px;
    max-height:90px;
    object-fit:contain;
    margin-bottom:20px;
}

.cover{
    width:200px;
    height:200px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid rgba(255,255,255,.15);
    box-shadow:0 0 25px rgba(0,0,0,.5);
    cursor:pointer;
    transition:.3s;
}

.cover.playing{
    animation:spin 10s linear infinite;
}

@keyframes spin{
from{transform:rotate(0);}
to{transform:rotate(360deg);}
}

.left-speaker{
    position:absolute;
    left:-90px;
    top:165px;
    width:90px;
}

.right-speaker{
    position:absolute;
    right:-90px;
    top:165px;
    width:90px;
}

.bottom-speaker{
    width:100%;
    margin-top:20px;
}

.song-info{
    margin-top:20px;
    color:#fff;
}

.song-title{
    font-size:24px;
    font-weight:bold;
}

.artist{
    color:#ccc;
    margin-top:5px;
}

.progress-area{
    margin-top:20px;
}

#progress{
    width:100%;
}

.time{
    display:flex;
    justify-content:space-between;
    color:#fff;
    font-size:13px;
    margin-top:5px;
}

.controls{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.controls button{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    font-size:22px;
}

.play{
    width:70px!important;
    height:70px!important;
    font-size:30px!important;
}

.playlist{
    position:fixed;
    top:0;
    right:-350px;
    width:350px;
    height:100%;
    background:#111;
    transition:.4s;
    overflow-y:auto;
    padding:20px;
}

.playlist.active{
    right:0;
}

.playlist h2{
    color:#fff;
    text-align:center;
    margin-bottom:20px;
}

.song{
    display:flex;
    align-items:center;
    gap:15px;
    color:#fff;
    padding:10px;
    cursor:pointer;
    border-radius:10px;
    margin-bottom:10px;
}

.song:hover{
    background:#222;
}

.song img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
}

.song-name{
    font-size:15px;
}

@media(max-width:768px){

.player{
width:90%;
}

.left-speaker,
.right-speaker{
display:none;
}

.playlist{
width:100%;
right:-100%;
}

}
</style>

</head>

<body>

<div class="background"></div>

<div class="player">

<img src="songs/1/logo.png" id="logo" class="logo">

<img src="songs/1/cover.jpg" id="cover" class="cover">

<img src="speakers/left.png" class="left-speaker">

<img src="speakers/right.png" class="right-speaker">

<div class="song-info">
<div class="song-title" id="title">Loading...</div>
<div class="artist">Music Player</div>
</div>

<div class="progress-area">

<input type="range" id="progress" value="0">

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

</div>

<div class="controls">

<button onclick="prevSong()">⏮</button>

<button class="play" onclick="playPause()">▶</button>

<button onclick="nextSong()">⏭</button>

</div>

<img src="speakers/bottom.png" class="bottom-speaker">

</div>

<div class="playlist" id="playlist">

<h2>Playlist</h2>

<!-- script.js will automatically add songs here -->

</div>

<audio id="audio"></audio>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
    });
}
</script>

</body>
</html>
