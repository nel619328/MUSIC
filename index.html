<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<title>Music Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#000;
    overflow:hidden;
}

/* Background */
.background{
    position:fixed;
    inset:0;
    background:url("cover/cover.jpg") center/cover no-repeat;
    filter:brightness(.35);
    z-index:-1;
}

/* Player */
.player{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:360px;
    max-width:92%;
    text-align:center;
}

/* Logo */
.logo{
    width:220px;
    max-width:80%;
    margin-bottom:20px;
}

/* Cover */
.cover{
    width:220px;
    height:220px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid rgba(255,255,255,.15);
    box-shadow:0 0 30px rgba(0,0,0,.5);
    cursor:pointer;
}

.cover.playing{
    animation:spin 10s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0);}
    to{transform:rotate(360deg);}
}

.song-info{
    margin-top:20px;
    color:#fff;
}

.song-title{
    font-size:25px;
    font-weight:bold;
}

.artist{
    color:#ddd;
    margin-top:5px;
}

/* Progress */
.progress-area{
    margin-top:20px;
}

#progress{
    width:100%;
}

.time{
    display:flex;
    justify-content:space-between;
    color:#fff;
    font-size:13px;
    margin-top:5px;
}

/* Controls */
.controls{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:25px;
}

.controls button{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    font-size:22px;
    background:#fff;
}

.play{
    width:70px!important;
    height:70px!important;
    font-size:30px!important;
}

/* Playlist */
.playlist{
    position:fixed;
    top:0;
    right:-330px;
    width:330px;
    height:100%;
    background:#111;
    color:#fff;
    overflow-y:auto;
    transition:.35s;
    padding:20px;
}

.playlist.active{
    right:0;
}

.playlist h2{
    text-align:center;
    margin-bottom:20px;
}

.song{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
}

.song:hover{
    background:#222;
}

.song img{
    width:60px;
    height:60px;
    border-radius:8px;
    object-fit:cover;
}

.song-name{
    font-size:15px;
}

@media(max-width:768px){

.player{
    width:92%;
}

.playlist{
    width:100%;
    right:-100%;
}

}
</style>

</head>

<body>

<div class="background"></div>

<div class="player">

<img id="logo" class="logo" src="songs/song1/logo.png">

<img id="cover" class="cover" src="songs/song1/cover.jpg">

<div class="song-info">
    <div id="title" class="song-title">Loading...</div>
    <div class="artist">Music Player</div>
</div>

<div class="progress-area">

<input type="range" id="progress" value="0">

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

</div>

<div class="controls">

<button onclick="prevSong()">⏮</button>

<button class="play" onclick="playPause()">▶</button>

<button onclick="nextSong()">⏭</button>

</div>

</div>

<div class="playlist" id="playlist">
<h2>Playlist</h2>
</div>

<audio id="audio"></audio>

<script src="script.js"></script>

<script>
if("serviceWorker" in navigator){
window.addEventListener("load",()=>{
navigator.serviceWorker.register("./service-worker.js");
});
}
</script>

</body>
</html>
