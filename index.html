<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#000000">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<title>Music Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    overflow:hidden;
    background:#000;
}

/* Full Screen Background */
.background{
    position:fixed;
    inset:0;
    background:url("cover/cover.jpg") center center/cover no-repeat;
    filter:brightness(.3);
    z-index:-2;
}

.background::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.35);
}

/* Main Player */
.player{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:400px;
    text-align:center;
}

/* Song Logo */
.logo{
    width:220px;
    max-height:90px;
    object-fit:contain;
    margin-bottom:20px;
}

/* Album Cover */
.cover{
    width:200px;
    height:200px;
    object-fit:cover;
    border-radius:50%;
    border:6px solid rgba(255,255,255,.15);
    cursor:pointer;
    box-shadow:0 0 25px rgba(0,0,0,.5);
    transition:.3s;
}

.cover:hover{
    transform:scale(1.05);
}

.cover.playing{
    animation:spin 10s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* Speaker Images */
.left-speaker{
    position:absolute;
    left:-90px;
    top:165px;
    width:90px;
}

.right-speaker{
    position:absolute;
    right:-90px;
    top:165px;
    width:90px;
}

.bottom-speaker{
    width:100%;
    margin-top:20px;
}

/* Song Info */
.song-info{
    color:#fff;
    margin-top:20px;
}

.song-title{
    font-size:24px;
    font-weight:bold;
}

.artist{
    margin-top:5px;
    color:#ddd;
}

/* Progress */
.progress-area{
    margin-top:20px;
}

#progress{
    width:100%;
    cursor:pointer;
}

.time{
    display:flex;
    justify-content:space-between;
    color:white;
    font-size:13px;
    margin-top:5px;
}

/* Controls */
.controls{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:20px;
}

.controls button{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    font-size:22px;
    cursor:pointer;
    transition:.3s;
}

.controls button:hover{
    transform:scale(1.1);
}

.play{
    width:70px !important;
    height:70px !important;
    font-size:30px !important;
}

/* Playlist */
.playlist{
    position:fixed;
    top:0;
    right:-340px;
    width:340px;
    height:100%;
    background:#111;
    overflow-y:auto;
    transition:.4s;
    padding:20px;
    color:white;
}

.playlist.active{
    right:0;
}

.playlist h2{
    text-align:center;
    margin-bottom:20px;
}

.song{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
    margin-bottom:10px;
}

.song:hover{
    background:#222;
}

.song img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
}

.song-name{
    font-size:15px;
}

.playlist::-webkit-scrollbar{
    width:6px;
}

.playlist::-webkit-scrollbar-thumb{
    background:#555;
}

/* Mobile */
@media(max-width:768px){

.player{
    width:90%;
}

.left-speaker,
.right-speaker{
    display:none;
}

.playlist{
    width:100%;
    right:-100%;
}

}
</style>

</head>
<body>

<div class="background"></div>

<div class="player">

    <!-- Dynamic Logo -->
    <img src="songs/1/logo.png" id="logo" class="logo">

    <!-- Dynamic Cover -->
    <img src="songs/1/cover.jpg" id="cover" class="cover">

    <!-- Speakers -->
    <img src="speakers/left.png" class="left-speaker">
    <img src="speakers/right.png" class="right-speaker">

    <!-- Song Info -->
    <div class="song-info">
        <div class="song-title" id="title">Song 1</div>
        <div class="artist">Music Player</div>
    </div>

    <!-- Progress -->
    <div class="progress-area">

        <input type="range" id="progress" value="0">

        <div class="time">
            <span id="current">0:00</span>
            <span id="duration">0:00</span>
        </div>

    </div>

    <!-- Controls -->
    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button class="play" onclick="playPause()">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>

    <!-- Bottom Speaker -->
    <img src="speakers/bottom.png" class="bottom-speaker">

</div>

<!-- Playlist -->
<div class="playlist" id="playlist">
    <h2>Playlist</h2>
    <!-- Generated by script.js -->
</div>

<!-- Audio -->
<audio id="audio"></audio>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
        .then(() => console.log("Service Worker Registered"))
        .catch(err => console.log(err));
    });
}
</script>

</body>
</html>
